name: Sync Upstream (Git Merge Strategy)

on:
  schedule:
    # Runs automatically every day at 2:00 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    # Allows manual trigger from the Actions tab
    inputs:
      force_sync:
        description: "Force sync even if no new commits detected"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

env:
  UPSTREAM_REPO: community-scripts/ProxmoxVE
  UPSTREAM_BRANCH: main
  FORK_BRANCH: main

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
      commit_count: ${{ steps.check.outputs.commit_count }}
    steps:
      - name: Validate PAT_WORKFLOW secret
        run: |
          if [ -z "${{ secrets.PAT_WORKFLOW }}" ]; then
            echo "::error::PAT_WORKFLOW secret is not set. Please create a Personal Access Token with 'repo' scope and add it as a repository secret named PAT_WORKFLOW."
            echo "See: https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.FORK_BRANCH }}
          token: ${{ secrets.PAT_WORKFLOW }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Configure the 'ours' merge driver for fork-specific files
          # This tells git to use our version for files marked with merge=ours in .gitattributes
          git config merge.ours.name "ours merge driver"
          git config merge.ours.driver "true"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git || true
          git fetch upstream ${{ env.UPSTREAM_BRANCH }}

      - name: Check for new upstream commits
        id: check
        run: |
          # Get the merge base between fork and upstream
          MERGE_BASE=$(git merge-base HEAD upstream/${{ env.UPSTREAM_BRANCH }} 2>/dev/null || echo "")

          if [ -z "$MERGE_BASE" ]; then
            echo "No common ancestor found - this may be a fresh sync"
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "commit_count=unknown" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Count commits in upstream that are not in fork
          UPSTREAM_COMMITS=$(git rev-list $MERGE_BASE..upstream/${{ env.UPSTREAM_BRANCH }} --count 2>/dev/null || echo "0")

          if [ "$UPSTREAM_COMMITS" -eq 0 ] && [ "${{ github.event.inputs.force_sync }}" != "true" ]; then
            echo "No new commits from upstream. Nothing to sync."
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "commit_count=0" >> $GITHUB_OUTPUT
          else
            echo "Found $UPSTREAM_COMMITS new commits from upstream."
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "commit_count=$UPSTREAM_COMMITS" >> $GITHUB_OUTPUT
          fi

  sync-and-create-pr:
    needs: check-and-sync
    if: needs.check-and-sync.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    outputs:
      shellcheck_status: ${{ steps.shellcheck.outputs.status }}
      auto_merge_decision: ${{ steps.pr.outputs.auto_merge }}
    steps:
      - name: Validate PAT_WORKFLOW secret
        run: |
          if [ -z "${{ secrets.PAT_WORKFLOW }}" ]; then
            echo "::error::PAT_WORKFLOW secret is not set. Please create a Personal Access Token with 'repo' scope and add it as a repository secret named PAT_WORKFLOW."
            echo "See: https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens"
            exit 1
          fi
          echo "PAT_WORKFLOW secret is configured."
          echo "Note: For fine-grained PATs, ensure these permissions are set:"
          echo "  - Contents: Read and write"
          echo "  - Pull requests: Read and write"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.FORK_BRANCH }}
          token: ${{ secrets.PAT_WORKFLOW }}

      - name: Configure Git with merge driver
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Configure the 'ours' merge driver
          # Files with merge=ours in .gitattributes will automatically keep fork version
          git config merge.ours.name "ours merge driver"
          git config merge.ours.driver "true"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git || true
          git fetch upstream ${{ env.UPSTREAM_BRANCH }}

      - name: Capture changed shell scripts from upstream
        id: capture-sh
        run: |
          echo "Capturing .sh files changed by upstream commits..."
          git diff --name-only HEAD upstream/${{ env.UPSTREAM_BRANCH }} -- '*.sh' > /tmp/changed_sh_files.txt 2>/dev/null || true
          COUNT=$(wc -l < /tmp/changed_sh_files.txt 2>/dev/null | tr -d ' ' || echo "0")
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Captured $COUNT .sh file(s) changed by upstream:"
          if [ -s /tmp/changed_sh_files.txt ]; then
            cat /tmp/changed_sh_files.txt
          else
            echo "  (none)"
          fi

      - name: Create sync branch
        id: branch
        run: |
          BRANCH_NAME="upstream-sync-$(date +%Y%m%d-%H%M%S)"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          git checkout -b "$BRANCH_NAME"

      - name: Merge upstream with fork preservation
        id: merge
        run: |
          echo "Starting merge from upstream/${{ env.UPSTREAM_BRANCH }}..."

          # Attempt merge with the 'ours' strategy for conflicts
          # The .gitattributes file configures which files use merge=ours
          git merge upstream/${{ env.UPSTREAM_BRANCH }} \
            --no-edit \
            -m "Merge upstream ${{ env.UPSTREAM_REPO }} into ${{ env.FORK_BRANCH }}" \
            2>&1 || MERGE_STATUS=$?

          if [ "${MERGE_STATUS:-0}" -eq 0 ]; then
            echo "Merge completed successfully with no conflicts."
            echo "merge_status=success" >> $GITHUB_OUTPUT
            echo "has_conflicts=false" >> $GITHUB_OUTPUT
          elif [ "${MERGE_STATUS:-0}" -eq 1 ]; then
            echo "Merge has conflicts that need resolution."
            echo "merge_status=conflicts" >> $GITHUB_OUTPUT
            echo "has_conflicts=true" >> $GITHUB_OUTPUT

            # List all conflicted files
            CONFLICTS=$(git diff --name-only --diff-filter=U 2>/dev/null || echo "")
            {
              echo "conflicted_files<<EOF"
              echo "$CONFLICTS"
              echo "EOF"
            } >> $GITHUB_OUTPUT

            echo "Resolving conflicts..."

            # 1. Handle content conflicts in fork-specific files - always keep our version
            FORK_CONTENT_FILES=$(git diff --name-only --diff-filter=U \
              -- 'CHANGELOG.md' 'misc/tools.func' 'README.md' 2>/dev/null || echo "")

            if [ -n "$FORK_CONTENT_FILES" ]; then
              echo "Resolving content conflicts in fork-specific files:"
              echo "$FORK_CONTENT_FILES"
              for file in $FORK_CONTENT_FILES; do
                echo "  Keeping fork version: $file"
                git checkout --ours "$file" 2>/dev/null || true
                git add "$file" 2>/dev/null || true
              done
            fi

            # 2. Handle modify/delete conflicts
            MODIFY_DELETE_CONFLICTS=$(git status --porcelain | grep "^DU" | awk '{print $2}' 2>/dev/null || echo "")

            if [ -n "$MODIFY_DELETE_CONFLICTS" ]; then
              echo "Resolving modify/delete conflicts (keeping fork deletions):"
              echo "$MODIFY_DELETE_CONFLICTS"
              for file in $MODIFY_DELETE_CONFLICTS; do
                echo "  Removing file (fork deleted it): $file"
                git rm --ignore-unmatch "$file" 2>/dev/null || true
              done
            fi

            # 3. Handle remaining conflicts in fork directories
            REMAINING_CONFLICTS=$(git diff --name-only --diff-filter=U 2>/dev/null || echo "")

            if [ -n "$REMAINING_CONFLICTS" ]; then
              echo "Resolving remaining conflicts in fork directories:"
              echo "$REMAINING_CONFLICTS"

              FORK_DIR_CONFLICTS=$(echo "$REMAINING_CONFLICTS" | grep -E '^(install/|ct/|frontend/|misc/images/|tools/addon/)' || true)

              if [ -n "$FORK_DIR_CONFLICTS" ]; then
                for file in $FORK_DIR_CONFLICTS; do
                  echo "  Keeping fork version: $file"
                  git checkout --ours "$file" 2>/dev/null || true
                  git add "$file" 2>/dev/null || true
                done
              fi
            fi

            # Check if there are still unresolved conflicts
            REMAINING=$(git diff --name-only --diff-filter=U 2>/dev/null || echo "")
            if [ -n "$REMAINING" ]; then
              echo "Warning: Some conflicts could not be auto-resolved:"
              echo "$REMAINING"
              echo "These will need manual resolution in the PR."
            else
              echo "All conflicts resolved successfully."
            fi
          else
            echo "Merge failed with status: ${MERGE_STATUS}"
            echo "merge_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Get upstream changes summary
        id: summary
        run: |
          # Get list of upstream commits being merged
          {
            echo "upstream_commits<<EOF"
            git log HEAD..upstream/${{ env.UPSTREAM_BRANCH }} --oneline --no-merges | head -30
            echo "EOF"
          } >> $GITHUB_OUTPUT

          # Get changed files summary
          {
            echo "changed_files<<EOF"
            git diff --name-only HEAD upstream/${{ env.UPSTREAM_BRANCH }} | head -50
            echo "EOF"
          } >> $GITHUB_OUTPUT

          # Count files by category
          TOTAL_CHANGED=$(git diff --name-only HEAD upstream/${{ env.UPSTREAM_BRANCH }} | wc -l)
          echo "total_changed=$TOTAL_CHANGED" >> $GITHUB_OUTPUT

      - name: Commit merge result
        run: |
          if git diff --cached --quiet 2>/dev/null && git diff --quiet 2>/dev/null; then
            echo "No changes to commit."
          else
            git commit -m "Merge upstream ${{ env.UPSTREAM_REPO }} with conflict resolution" \
              -m "- Fork-specific files preserved (CHANGELOG.md, misc/tools.func)" \
              -m "- Deleted files kept as deleted (fork deletions preserved)" \
              -m "- New upstream scripts added" || echo "Commit may have already been made"
          fi

      - name: Check shellcheck on changed shell scripts
        id: shellcheck
        run: |
          SHELLCHECK_STATUS="pass"

          echo "::group::Installing shellcheck"
          sudo apt-get update -qq 2>/dev/null
          if ! sudo apt-get install -y shellcheck 2>/dev/null; then
            echo "::warning::shellcheck installation failed — skipping check (fail-open: will create diagnostic PR)"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            printf '%s\n' "ShellCheck binary was unavailable during this workflow run." > /tmp/shellcheck_report.txt
            echo "::endgroup::"
            exit 0
          fi
          echo "shellcheck $(shellcheck --version 2>&1 | head -1) installed"
          echo "::endgroup::"

          echo "::group::Running shellcheck"
          if [ ! -f /tmp/changed_sh_files.txt ] || [ ! -s /tmp/changed_sh_files.txt ]; then
            echo "No .sh files changed by upstream. Nothing to check."
            echo "status=pass" >> "$GITHUB_OUTPUT"
            printf '%s\n' "No .sh files changed by upstream." > /tmp/shellcheck_report.txt
            echo "::endgroup::"
            exit 0
          fi

          # Build shellcheck report header
          printf '%s\n' "## 🔍 ShellCheck Results" "" "| File | Result |" "|------|--------|" > /tmp/shellcheck_report.txt

          # Detail file for failures
          :> /tmp/shellcheck_detail.txt

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            if [ -f "$file" ]; then
              RESULT=$(shellcheck -Calways "$file" 2>&1) || true
              SC_EXIT=$?
              if [ "$SC_EXIT" -ne 0 ]; then
                SHELLCHECK_STATUS="fail"
                echo "| \`$file\` | ❌ Issues found |" >> /tmp/shellcheck_report.txt
                {
                  printf '### ❌ shellcheck: `%s`\n\n' "$file"
                  printf '```\n%s\n```\n\n' "$RESULT"
                } >> /tmp/shellcheck_detail.txt
                echo "::error file=${file}::shellcheck found issues in ${file}"
              else
                echo "| \`$file\` | ✅ Clean |" >> /tmp/shellcheck_report.txt
                echo "  ✅ $file — clean"
              fi
            else
              echo "| \`$file\` (deleted) | ⬜ N/A |" >> /tmp/shellcheck_report.txt
              echo "  ⬜ $file — file deleted (skipping)"
            fi
          done < /tmp/changed_sh_files.txt

          # Append detailed output if there were failures
          if [ "$SHELLCHECK_STATUS" = "fail" ]; then
            printf '\n%s\n' "### Detailed shellcheck output" >> /tmp/shellcheck_report.txt
            cat /tmp/shellcheck_detail.txt >> /tmp/shellcheck_report.txt
          fi

          echo "status=$SHELLCHECK_STATUS" >> "$GITHUB_OUTPUT"
          echo "::endgroup::"
          echo "ShellCheck status: $SHELLCHECK_STATUS"

      - name: Push sync branch
        run: |
          git push origin ${{ steps.branch.outputs.branch_name }} --force

      - name: Create Pull Request
        id: pr
        env:
          GH_TOKEN: ${{ secrets.PAT_WORKFLOW }}
        run: |
          set -euo pipefail

          BRANCH="${{ steps.branch.outputs.branch_name }}"
          HAS_CONFLICTS="${{ steps.merge.outputs.has_conflicts }}"
          CONFLICTED_FILES="${{ steps.merge.outputs.conflicted_files }}"
          SHELLCHECK_STATUS="${{ steps.shellcheck.outputs.status }}"
          SH_FILE_COUNT="${{ steps.capture-sh.outputs.count }}"

          echo "============================================"
          echo "Auto-Merge Decision Gate"
          echo "============================================"
          echo "  has_conflicts     : $HAS_CONFLICTS"
          echo "  shellcheck_status : $SHELLCHECK_STATUS"
          echo "  sh_files_changed  : $SH_FILE_COUNT"
          echo "============================================"

          # ── Build PR body in temp file ──────────────────────────────────
          PR_BODY_FILE="/tmp/pr_body.md"

          cat > "$PR_BODY_FILE" << 'PRBODYEOF'
          ## 🔄 Upstream Sync Summary

          This PR syncs the latest changes from upstream [`PRBODYEOF
          printf '%s' "${{ env.UPSTREAM_REPO }}" >> "$PR_BODY_FILE"
          cat >> "$PR_BODY_FILE" << 'PRBODYEOF'
          `](https://github.com/PRBODYEOF
          printf '%s' "${{ env.UPSTREAM_REPO }}" >> "$PR_BODY_FILE"
          cat >> "$PR_BODY_FILE" << 'PRBODYEOF'
          ) while preserving fork-specific customizations.

          ### 📊 Sync Statistics
          - **Upstream commits:** PRBODYEOF
          printf '%s' " ${{ needs.check-and-sync.outputs.commit_count }}" >> "$PR_BODY_FILE"
          cat >> "$PR_BODY_FILE" << 'PRBODYEOF'

          - **Files changed:** PRBODYEOF
          printf '%s' " ${{ steps.summary.outputs.total_changed }}" >> "$PR_BODY_FILE"
          cat >> "$PR_BODY_FILE" << 'PRBODYEOF'

          - **Merge conflicts:** PRBODYEOF
          printf '%s' " ${HAS_CONFLICTS:-none}" >> "$PR_BODY_FILE"
          cat >> "$PR_BODY_FILE" << 'PRBODYEOF'


          ### 📋 Upstream Commits (last 30)
          ```
          PRBODYEOF
          printf '%s' "${{ steps.summary.outputs.upstream_commits }}" >> "$PR_BODY_FILE"
          cat >> "$PR_BODY_FILE" << 'PRBODYEOF'
          ```

          ### 📁 Changed Files
          <details>
          <summary>Click to view changed files</summary>

          ```
          PRBODYEOF
          printf '%s' "${{ steps.summary.outputs.changed_files }}" >> "$PR_BODY_FILE"
          cat >> "$PR_BODY_FILE" << 'PRBODYEOF'
          ```
          </details>
          PRBODYEOF

          # ── Conflict resolution section ─────────────────────────────────
          if [ "$HAS_CONFLICTS" = "true" ]; then
            cat >> "$PR_BODY_FILE" << 'PRBODYEOF'

          ### ⚠️ Conflicts Auto-Resolved

          The following conflict resolution strategy was applied:

          1. **Fork-specific content files** (CHANGELOG.md, misc/tools.func, README.md) - Kept fork version
          2. **Modify/delete conflicts** - Kept fork's deletions (files removed in fork stay removed)
          3. **Fork directory conflicts** (install/, ct/, frontend/) - Kept fork version

          Original conflicted files:
          ```
          PRBODYEOF
            printf '%s' "$CONFLICTED_FILES" >> "$PR_BODY_FILE"
            cat >> "$PR_BODY_FILE" << 'PRBODYEOF'
          ```
          PRBODYEOF
          else
            cat >> "$PR_BODY_FILE" << 'PRBODYEOF'

          ### ✅ Clean Merge

          No conflicts detected. All changes merged cleanly.
          PRBODYEOF
          fi

          # ── ShellCheck results ──────────────────────────────────────────
          if [ -f /tmp/shellcheck_report.txt ]; then
            printf '\n' >> "$PR_BODY_FILE"
            cat /tmp/shellcheck_report.txt >> "$PR_BODY_FILE"
          fi

          # ── Preserved files section ─────────────────────────────────────
          cat >> "$PR_BODY_FILE" << 'PRBODYEOF'

          ### 🔒 Fork-Specific Files Preserved

          The following files/directories are configured in `.gitattributes` to always keep the fork version:
          - `install/` - Custom install scripts
          - `ct/` - Custom container scripts
          - `frontend/` - Custom frontend
          - `misc/images/` - Custom images
          - `.github/workflows/` - Custom CI/CD workflows
          - `.github/runner/` - Custom runner configurations
          - `tools/addon/` - Custom addon tools
          - `README.md` - Fork-specific documentation
          - `CHANGELOG.md` - Fork-specific changelog

          ### ✅ Pre-Merge Checklist
          - [ ] Review all changed files for unexpected modifications
          - [ ] Verify fork-specific files are intact
          - [ ] Test any new scripts or features from upstream

          ---
          *This PR was automatically created by the [upstream-sync workflow](https://github.com/PRBODYEOF
          printf '%s' "${{ github.repository }}" >> "$PR_BODY_FILE"
          cat >> "$PR_BODY_FILE" << 'PRBODYEOF'
          /blob/main/.github/workflows/upstream-sync.yml).*
          PRBODYEOF

          # ═══════════════════════════════════════════════════════════════
          # AUTO-MERGE DECISION GATE
          # ═══════════════════════════════════════════════════════════════

          AUTO_MERGE="false"
          DECISION_REASON=""

          # Determine if we should auto-merge.
          # Fail-open principle: any unexpected condition falls back to
          # diagnostic PR creation; we never auto-merge when uncertain.
          if [ "$HAS_CONFLICTS" = "false" ]; then
            if [ "$SHELLCHECK_STATUS" = "pass" ]; then
              AUTO_MERGE="true"
              DECISION_REASON="No conflicts + shellcheck passed"
            elif [ "$SH_FILE_COUNT" = "0" ] || [ -z "$SH_FILE_COUNT" ]; then
              AUTO_MERGE="true"
              DECISION_REASON="No conflicts + no .sh files to check"
            elif [ "$SHELLCHECK_STATUS" = "skipped" ]; then
              AUTO_MERGE="false"
              DECISION_REASON="ShellCheck unavailable (uncertain — falling back to diagnostic PR)"
            else
              AUTO_MERGE="false"
              DECISION_REASON="ShellCheck failures detected"
            fi
          else
            AUTO_MERGE="false"
            DECISION_REASON="Merge conflicts present"
          fi

          echo ""
          echo "Decision: auto_merge=$AUTO_MERGE"
          echo "Reason  : $DECISION_REASON"
          echo "auto_merge=$AUTO_MERGE" >> "$GITHUB_OUTPUT"

          # ═══════════════════════════════════════════════════════════════
          # PR CREATION & AUTO-MERGE / DIAGNOSTIC BRANCHING
          # ═══════════════════════════════════════════════════════════════

          if [ "$AUTO_MERGE" = "true" ]; then
            # ── AUTO-MERGE PATH ──────────────────────────────────────────
            TITLE="🔄 Upstream Sync - $(date +%Y-%m-%d)"

            echo "::group::Creating auto-merge PR"
            PR_URL=$(gh pr create \
              --title "$TITLE" \
              --body-file "$PR_BODY_FILE" \
              --base "${{ env.FORK_BRANCH }}" \
              --head "$BRANCH" 2>&1) || {
              echo "::warning::gh pr create failed: $PR_URL"
              echo "::endgroup::"
              exit 0
            }
            echo "PR created: $PR_URL"
            echo "::endgroup::"

            echo "::group::Enabling auto-merge"
            gh pr merge "$PR_URL" --auto --squash 2>&1 || {
              echo "::warning::gh pr merge --auto --squash failed — PR exists but auto-merge was not enabled"
              echo "::endgroup::"
              exit 0
            }
            echo "Auto-merge enabled on $PR_URL"
            echo "::endgroup::"

          else
            # ── DIAGNOSTIC PR PATH ───────────────────────────────────────
            TITLE="👁️ Needs Review - Upstream Sync - $(date +%Y-%m-%d)"

            echo "::group::Creating diagnostic PR"
            PR_URL=$(gh pr create \
              --title "$TITLE" \
              --body-file "$PR_BODY_FILE" \
              --base "${{ env.FORK_BRANCH }}" \
              --head "$BRANCH" \
              --label "needs-review" 2>&1) || {
              echo "::warning::gh pr create failed: $PR_URL"
              echo "::endgroup::"
              exit 0
            }
            echo "PR created: $PR_URL"
            echo "::endgroup::"

            # Build diagnostic comment
            DIAG_FILE="/tmp/diag_comment.md"
            cat > "$DIAG_FILE" << DIAGEOF
          ## 🔍 Auto-Merge Blocked

          This PR requires manual review because the auto-merge gate did not pass.

          ### Blocking Reason

          **$DECISION_REASON**

          ### Gate Details
          | Gate | Status |
          |------|--------|
          | Merge conflicts | $HAS_CONFLICTS |
          | ShellCheck | $SHELLCHECK_STATUS |
          | .sh files changed | $SH_FILE_COUNT |
          DIAGEOF

            if [ "$HAS_CONFLICTS" = "true" ]; then
              cat >> "$DIAG_FILE" << DIAGEOF

          ### Conflicted Files
          \`\`\`
          ${CONFLICTED_FILES:-see PR body}
          \`\`\`
          DIAGEOF
            fi

            if [ "$SHELLCHECK_STATUS" = "fail" ] || [ "$SHELLCHECK_STATUS" = "skipped" ]; then
              printf '\n%s\n' "### ShellCheck Details" >> "$DIAG_FILE"
              cat /tmp/shellcheck_report.txt >> "$DIAG_FILE" 2>/dev/null || true
            fi

            cat >> "$DIAG_FILE" << DIAGEOF

          ---
          *This diagnostic was automatically generated by the [upstream-sync workflow](https://github.com/${{ github.repository }}/blob/main/.github/workflows/upstream-sync.yml).*
          DIAGEOF

            echo "::group::Adding diagnostic comment"
            gh pr comment "$PR_URL" --body-file "$DIAG_FILE" 2>&1 || {
              echo "::warning::gh pr comment failed — PR exists without diagnostic comment"
            }
            echo "::endgroup::"
          fi

      - name: Cleanup
        if: always()
        run: |
          # Abort any pending merge to clean up git state
          git merge --abort 2>/dev/null || true
          git checkout ${{ env.FORK_BRANCH }}
          git branch -D ${{ steps.branch.outputs.branch_name }} 2>/dev/null || true
